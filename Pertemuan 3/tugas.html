<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .registration-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .registration-container h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .registration-form {
            display: flex;
            flex-direction: column;
        }

        .reg-form-group {
            margin-bottom: 20px;
        }

        .reg-form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .reg-form-group input[type="text"],
        .reg-form-group input[type="email"],
        .reg-form-group input[type="file"],
        .reg-form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .reg-form-group input[type="text"]:focus,
        .reg-form-group input[type="email"]:focus,
        .reg-form-group input[type="file"]:focus,
        .reg-form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }

        .radio-group > div,
        .checkbox-group > div {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reg-form-group input[type="radio"],
        .reg-form-group input[type="checkbox"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .reg-form-group input[type="radio"] + label,
        .reg-form-group input[type="checkbox"] + label {
            display: inline;
            margin: 0;
            font-weight: normal;
            cursor: pointer;
        }

        .button-container {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-submit,
        .btn-reset {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background-color: #ecf0f1;
            color: #2c3e50;
            border: 1px solid #bdc3c7;
        }

        .btn-reset:hover {
            background-color: #bdc3c7;
        }

        @media (max-width: 480px) {
            .registration-container {
                padding: 25px;
            }

            .registration-container h2 {
                font-size: 1.4rem;
                margin-bottom: 20px;
            }

            .radio-group,
            .checkbox-group {
                flex-direction: column;
                gap: 10px;
            }

            .button-container {
                flex-direction: column;
            }

            .btn-submit,
            .btn-reset {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="registration-container">
        <h2>Form Pendaftaran</h2>
        
        <form action="#" method="post" enctype="multipart/form-data" class="registration-form">
            
            <!-- Nama -->
            <div class="reg-form-group">
                <label for="nama">Nama:</label>
                <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
            </div>

            <!-- Email -->
            <div class="reg-form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Masukkan email" required>
            </div>

            <!-- Jenis Kelamin -->
            <div class="reg-form-group">
                <label>Jenis Kelamin:</label>
                <div class="radio-group">
                    <div>
                        <input type="radio" id="laki" name="gender" value="Laki-laki">
                        <label for="laki">Laki-laki</label>
                    </div>
                    <div>
                        <input type="radio" id="perempuan" name="gender" value="Perempuan">
                        <label for="perempuan">Perempuan</label>
                    </div>
                </div>
            </div>

            <!-- Hobi -->
            <div class="reg-form-group">
                <label>Hobi:</label>
                <div class="checkbox-group">
                    <div>
                        <input type="checkbox" id="musik" name="hobi" value="Musik">
                        <label for="musik">Musik</label>
                    </div>
                    <div>
                        <input type="checkbox" id="olahraga" name="hobi" value="Olahraga">
                        <label for="olahraga">Olahraga</label>
                    </div>
                </div>
            </div>

            <!-- Kota -->
            <div class="reg-form-group">
                <label for="kota">Pilih Kota:</label>
                <select id="kota" name="kota" required>
                    <option value="">-- Pilih Kota --</option>
                    <option value="Jakarta">Jakarta</option>
                    <option value="Bandung">Bandung</option>
                    <option value="Surabaya">Surabaya</option>
                    <option value="Yogyakarta">Yogyakarta</option>
                </select>
            </div>

            <!-- Upload Foto -->
            <div class="reg-form-group">
                <label for="foto">Upload Foto:</label>
                <input type="file" id="foto" name="foto" accept="image/*">
            </div>

            <!-- Buttons -->
            <div class="button-container">
                <button type="submit" class="btn-submit">Daftar</button>
                <button type="reset" class="btn-reset">Reset</button>
            </div>
        </form>
    </div>
</body>
</html>
